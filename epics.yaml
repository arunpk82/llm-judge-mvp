    acceptance_criteria:
      - "Given 3 runs with increasing flip rate, when monitoring runs, then a flip trend alert is raised"
    tasks:
      - "TASK-26.1: Implement cross-run flip rate tracking"
      - "TASK-26.2: Implement flip trend detection"
      - "TASK-26.3: Add flip monitoring report"

