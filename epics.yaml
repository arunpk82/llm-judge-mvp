  - id: EPIC-25
    title: "[EPIC] EPIC-25 Metric Drift Detection"
    milestone: CAP-5
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring]
    status: planned
    effort: "M — 2 weeks"
    purpose: >
      Detect metric changes across evaluation runs with trend detection
      and alerts. Mandatory — directly gates L3 KPI: dataset drift
      monitored with < 24h alert SLA.
    vision_objective: "Integration with modern AI development pipelines"
    scope_in:
      - Metric trend detection across runs
      - Metric change alerts
    acceptance_criteria:
      - "Given 5 consecutive runs with declining F1, when drift detection runs, then a downward trend alert is raised"
    tasks:
      - "TASK-25.1: Implement metric history store (per-metric time series)"
      - "TASK-25.2: Implement trend detection algorithm"
      - "TASK-25.3: Add drift alert to evaluation report"

  - id: EPIC-26
    title: "[EPIC] EPIC-26 Decision Flip Monitoring"
    milestone: CAP-5
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring]
    status: in_progress
    effort: "M — 2 weeks"
    purpose: >
      Detect and report decision changes across evaluation runs. Mandatory —
      decision flip rate is a primary signal for drift detection, gating
      the L3 KPI: dataset drift monitored.
    vision_objective: "Integration with modern AI development pipelines"
    scope_in:
      - Decision flip detection across runs
      - Flip trend reporting
    scope_out:
