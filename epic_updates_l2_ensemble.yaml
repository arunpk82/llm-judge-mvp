# ==============================================================
# ADD: EPIC 7.22 — L2 Knowledge Graph Ensemble
# ==============================================================

  epic_7_22:
    name: "L2 Knowledge Graph Ensemble Pipeline"
    capability: CAP-7A
    pct: PCT-5+
    status: code-complete
    priority: critical
    description: >
      Multi-pass knowledge graph extraction + ensemble traversal. Replaces old
      L3 GraphRAG (simple spaCy SVO exact match) with a 5-graph ensemble system.

      Architecture:
        1. Multi-pass extraction: 5 Gemini passes per source document
           P1: Entity profiles (who + attributes + aliases)
           P2: Event timeline (who did what, when, where)
           P3: Relationships (how entities connect + NOT relationships)
           P4: Numbers and dates (every quantity with context)
           P5: Negations and boundaries (what is NOT said)
           P6: Verification (compare source against P1-P5, find gaps)

        2. Graph construction: 5 NetworkX DiGraphs per source
           G1: Entity graph (entities + attributes + alias edges)
           G2: Event graph (entity → action → target paths, P1 cross-referenced)
           G3: Relationship graph (entity → relationship → entity + NOT edges)
           G4: Number graph (entity → number nodes)
           G5: Negation graph (negation statements, absent info, corrections)

        3. Sentence parsing: spaCy en_core_web_sm
           SVO triples with passive voice detection
           Pronoun resolution (same-sentence entity + main character fallback)
           Verb synonym map (18 pairs)
           Skip generic verbs (be, have, do, etc.)

        4. Graph traversal: per-sentence, per-graph
           Entity resolution (exact → alias → substring → word overlap)
           Passive voice (entity as target, not actor)
           Object verification (response objects against graph targets/where)
           Contradiction detection (graph has different targets → FLAG)
           Zero-action flagging (entity has 0 actions → FLAG)

        5. Ensemble aggregation:
           Flag always wins over grounded (specific beats general)
           1+ grounded + 0 flagged = grounded (low/medium/high confidence)
           All unknown = unknown (passes to L3/L4)

      Science Gate results (Exp 31):
        61 cleared at 100% precision, 0 safety violations
        11/16 hallucinations caught (69% recall)
        Combined with L1: 78 cleared, 11/16 caught
        Cost: $0.01 per source (cached), 2.1s traversal for 283 sentences

    science_gate_date: "2026-04-10"
    science_gate_results:
      experiment: "exp31_multipass_ensemble"
      dataset: "RAGTruth 50 cases, 283 sentences, 16 hallucinated"
      unique_sources: 9
      extraction_passes: 6
      extraction_cost: "$0.09 total ($0.01/source)"
      extraction_completeness: "~95% (vs ~80% single-pass)"
      grounded: 61
      grounded_precision: 1.0
      safety_violations: 0
      catches: "11/16 (69%)"
      flag_precision: 0.105
      missed_hallucinations:
        - "ragtruth_58 S4: abstract subject (spaCy parse failure)"
        - "ragtruth_121 S2: garbled subject (spaCy parse failure)"
        - "ragtruth_123 S1: pronoun + verb not in graph"
        - "ragtruth_146 S2: abstract subject (spaCy parse failure)"
        - "ragtruth_185 S3: pronoun + extraction error (Saltara in graph)"

    cascade_rule: >
      Grounded (100% precision) STOPS — sentence cleared, skips remaining layers.
      Flagged (<100% precision) CASCADES — passes to next layer with evidence.
      Unknown CASCADES — passes to next layer.

    kpi_gate:
      direct: "Clearance precision 100% (0 safety violations)"
      direct: "Recall ≥69% (11/16 before L3/L4)"
      prerequisite: "Flag precision — graph completeness determines FP rate"

    files_changed:
      - "src/llm_judge/calibration/hallucination_graphs.py (NEW — 550 lines)"
      - "src/llm_judge/calibration/hallucination.py (modified — L2 integration)"
      - "experiments/test_production_pipeline.py (NEW — RAGTruth 50 verification)"
      - "experiments/exp31_multipass_fact_tables.json (extraction results)"
      - "experiments/exp31_stage2_ensemble_results.json (traversal results)"

    learnings:
      - "L34: Existence ≠ correctness. Only path verification achieves safe clearance."
      - "L35: Multi-pass extraction solves single-point-of-failure (80% → 95%)."
      - "L36: Knowledge graph is architectural asset transcending L2."
      - "L37: Entity resolution + verb matching + path traversal must work together."
      - "L38: Absence has no synonyms when graph ≥95% complete."
      - "L39: Flag always beats grounded in ensemble aggregation."
      - "L40: Source deduplication essential at scale (82% cost reduction)."

# ==============================================================
# ADD: EPIC 7.23 — Pipeline Funnel Report & Diagnostics
# ==============================================================

  epic_7_23:
    name: "Pipeline Funnel Report & Diagnostics Output"
    capability: CAP-7A, CAP-8
    pct: PCT-5+
    status: in-progress
    priority: high
    description: >
      Two-tier reporting for the hallucination detection pipeline:

      1. Screen output: Cascade Funnel
         Clean, readable waterfall showing L1 → L2 → L3 → L4 → L5 flow.
         Each layer shows: IN, Grounded, Flagged, Unknown, Cumulative metrics.
         Inspired by industry practices: Google Perspective API cascade waterfall,
         Stripe Radar economic funnel, Meta Integrity tiered escalation.

      2. JSON file: Full Diagnostics
         Per-sentence details with per-graph verdicts, evidence strings, timing.
         Confusion matrix (TP/TN/FP/FN) per layer and cumulative.
         Flag analysis: reasons distribution, precision, false positive breakdown.
         Missed hallucinations with root cause classification.

      Design principles:
        - Each layer answers 4 questions: How many received? How many resolved?
          How many passed through? What's the cost/latency?
        - Cumulative metrics show pipeline's total effect at each stage.
        - Funnel visually shows WHERE in the pipeline value is created.
        - JSON enables offline analysis without re-running the pipeline.

    kpi_gate:
      direct: "Evidence completeness 100% — every flagged sentence has evidence"
      prerequisite: "Observability — every verdict traceable across all layers"

    files_changed:
      - "src/llm_judge/calibration/hallucination.py (add funnel_report method)"
      - "experiments/test_production_pipeline.py (add funnel output)"

    output_format:
      screen: "Cascade waterfall with IN/Grounded/Flagged/Unknown per layer"
      json: "Full diagnostics with per-sentence details, confusion matrix, flag analysis"

# ==============================================================
# ADD: EPIC 7.24 — L5 Human Review Layer
# ==============================================================

  epic_7_24:
    name: "L5 Human Review Layer"
    capability: CAP-7A, CAP-8
    pct: PCT-6
    status: planned
    priority: medium
    description: >
      Final escalation layer for sentences that L1-L4 cannot resolve.
      Human reviewer receives the sentence with full evidence trail from
      all previous layers, making review targeted rather than from-scratch.

      L5 receives:
        - Sentences with "unknown" verdict after L4 (no layer could resolve)
        - Low-confidence verdicts from any layer that need human confirmation
        - Full evidence: per-graph verdicts, flag reasons, classifier scores

      L5 produces:
        - Confirmed: human agrees with machine verdict
        - Overturned: human disagrees — machine was wrong
        - Deferred: human needs more context (escalate to domain expert)

      Feedback loop: Human decisions feed back to improve L1-L4:
        - Overturned flags → add to false positive training set
        - Confirmed hallucinations missed by L2 → improve extraction prompt
        - Patterns in deferred cases → identify new rule categories

      Relates to EPIC 7.3 (Human Escalation & Feedback Loop) but specific
      to the 5-layer hallucination pipeline context. EPIC 7.3 covers the
      general adjudication interface; this EPIC covers L5 integration.

    kpi_gate:
      direct: "Human review throughput — minutes per sentence"
      direct: "Override rate — % of machine verdicts overturned by human"
      prerequisite: "Final recall — human catches what L1-L4 missed"

    dependencies:
      - "EPIC 7.22 (L2 Ensemble) — provides evidence trail"
      - "EPIC 7.23 (Funnel Report) — provides diagnostic context"
      - "EPIC 7.3 (Human Escalation) — provides adjudication UI"

    files_changed:
      - "src/llm_judge/calibration/hallucination.py (add L5 routing)"
      - "TBD — adjudication UI endpoint"
