# SUPERSEDED by hallucination_pipeline.yaml (ADR-0026, ADR-0029)
# Hallucination Pipeline Configuration
# Enable/disable layers and tune thresholds without code changes.
#
# Usage:
#   - Toggle layers on/off for benchmarking or production
#   - L2-only isolation: disable L0, L1, L3, L4
#   - Production: enable all layers
#   - Override at call site: pass pipeline_config dict to check_hallucination()

layers:
  L0_deterministic: true
  L1_gate1_minilm: true
  L2a_minicheck: true
  L2b_deberta_nli: true
  L3_graphrag: false          # disabled: 0 catches in funnel position (all benchmark runs)
  L4_gemini: true

# Gate 1 behaviour when it flags fail/ambiguous
# "signal"  — continue to L2+ for verification (recommended)
# "verdict" — stop here, Gate 1 is final decision
gate1_mode: signal

# Source document handling
source_chunking: false        # enable to chunk long sources for MiniCheck
chunk_size: 3000
chunk_overlap: 500

# Thresholds
thresholds:
  gate1_grounding_ratio: 0.80
  gate1_min_sentence_sim: 0.30
  gate1_similarity: 0.60
  minicheck: 0.50
  nli_entailment: 0.70
  max_ungrounded_claims: 2
