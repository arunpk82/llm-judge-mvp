run_id_prefix: pr-gate

dataset:
  path: datasets/deterministic/math_basic_v1.jsonl
  dataset_id: math_basic
  version: v1

# PR-gate sampling (deterministic + stable as dataset grows)
# NOTE: Requires every row to have a non-empty string `case_id`.
sample:
  n: 300
  seed: 42
  strategy: stable_hash

rubric_id: chat_quality
judge_engine: deterministic
output_dir: reports/runs
random_seed: 42