# Property-Based Evaluation Configuration
# Every property has three independent dimensions:
#   enabled: Does it run?
#   gate_mode: informational | auto-gated | human-gated
#   visibility: per-persona show/hide
#
# PCT-1: All built properties start informational. Unbuilt properties disabled.
# No property stays permanently informational — ungated = defect escape risk.

schema_version: "1"

properties:

  # === Category 1: Faithfulness & Grounding (Is it real?) ===

  groundedness:
    id: "1.1"
    category: faithfulness
    enabled: true
    gate_mode: informational
    threshold: 0.3          # below this grounding ratio → flagged
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  ungrounded_claims:
    id: "1.2"
    category: faithfulness
    enabled: true
    gate_mode: informational
    threshold: 2            # above this count → flagged
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  citation_verification:
    id: "1.3"
    category: faithfulness
    enabled: true
