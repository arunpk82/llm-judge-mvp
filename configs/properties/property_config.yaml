# Property-Based Evaluation Configuration
# Every property has three independent dimensions:
#   enabled: Does it run?
#   gate_mode: informational | auto-gated | human-gated
#   visibility: per-persona show/hide
#
# PCT-5: All 28 properties enabled, all informational.
# Next step: Phase 2 measurement sweep → calibrate thresholds → promote to gated.
# Grounding threshold updated from 0.3 to 0.2 based on Science Gate results
# (cs_012 caught at 0.20 with 7.1% FP rate).

schema_version: "2"

properties:

  # === Category 1: Faithfulness & Grounding (Is it real?) ===

  groundedness:
    id: "1.1"
    category: faithfulness
    enabled: true
    gate_mode: informational
    threshold: 0.2            # Science Gate validated: 135x separation at 0.20
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  ungrounded_claims:
    id: "1.2"
    category: faithfulness
    enabled: true
    gate_mode: informational
    threshold: 2              # above this count → flagged
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  citation_verification:
    id: "1.3"
    category: faithfulness
    enabled: true
    gate_mode: informational
    threshold: 0              # any unverifiable citation → flagged
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  attribution_accuracy:
    id: "1.4"
    category: faithfulness
    enabled: true              # PCT-4: RAG context now available (EPIC 7.14)
    gate_mode: informational
    visibility:
      ml_engineer: show
      product_owner: hide
      qa_lead: show
      executive: hide

  fabrication_detection:
