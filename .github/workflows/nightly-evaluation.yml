name: Nightly Evaluation Suite

on:
  schedule:
    # 02:00 UTC every night
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

jobs:
  nightly-full-evaluation:
    name: Full Evaluation Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full evaluation matrix
        run: |
          echo "Running nightly full evaluation suite..."
          pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            -m "not slow_integration"

      - name: Run baseline comparison
        run: |
          echo "Checking for evaluation regressions against baseline..."
          python -m llm_judge baseline compare \
            --baseline baselines/latest.json \
            --run-output /tmp/nightly_run.json \
            --threshold 0.03 2>/dev/null || \
          echo "ℹ️  Baseline comparison: baseline CLI not yet available, skipping"

      - name: Upload nightly coverage
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-${{ github.run_number }}
          path: |
            coverage.xml
            htmlcov/

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Nightly evaluation failure — ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly evaluation suite failed on run #${context.runNumber}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'priority:critical']
            });
