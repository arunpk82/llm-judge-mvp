name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.1.1"
          poetry --version

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        run: |
          poetry install --no-interaction

      - name: Lint (ruff)
        run: |
          poetry run ruff check .

      - name: Type-check (mypy)
        run: |
          poetry run mypy src

      - name: Tests (pytest)
        run: |
          poetry run pytest

      - name: Benchmark (golden dataset)
        run: |
          poetry run python -m llm_judge.eval.run --spec configs/runspecs/pr_gate.yaml

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runs
          path: reports/runs
          if-no-files-found: error
          
      - name: Print benchmark metrics
        if: always()
        run: |
          RUN_ID=$(ls -1t reports/runs | head -n 1)
          echo "Latest run: $RUN_ID"
          cat "reports/runs/$RUN_ID/metrics.json"
          
      - name: Docker build (smoke)
        run: |
          docker build -f Dockerfile --target release-image -t llm-judge:ci .
          
          
          