name: release-image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LOCAL_CI_TAG: llm-judge-mvp:ci
  TRIVY_VERSION: "0.53.0"

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true
          cleanup: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Build ONCE and load into local docker daemon (the image Trivy will scan)
      - name: Build (load) image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          pull: true
          no-cache: true
          tags: ${{ env.LOCAL_CI_TAG }}
          build-args: |
            AUDIT_SEED=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Show image identity (what we will scan + push)
        run: |
          set -euxo pipefail
          docker image inspect ${{ env.LOCAL_CI_TAG }} --format 'ImageID={{.Id}} Created={{.Created}} RepoTags={{json .RepoTags}}'

      # Sanity: what runtime Python sees
      - name: Runtime sanity - pip / versions / dist-info list
        run: |
          set -euxo pipefail
          docker run --rm ${{ env.LOCAL_CI_TAG }} sh -lc '
            python -V
            python -m pip --version
            python -m pip show wheel jaraco.context || true
            python - <<PY
import site, glob, os
sp = site.getsitepackages()[0]
hits = sorted(os.path.basename(p) for p in glob.glob(sp + "/*.dist-info") if ("wheel" in p or "jaraco" in p))
print("site-packages:", sp)
print("dist-info hits:", hits)
PY
          '

      # ✅ Forensics: run Trivy JSON locally to extract the PATH(s) Trivy is using
      # This is the missing root-cause signal. It will tell us exactly where 0.45.1 / 5.3.0 is coming from.
      - name: Trivy forensics (JSON) - print PkgPath for wheel/jaraco findings
        run: |
          set -euxo pipefail

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" -w /work \
            ghcr.io/aquasecurity/trivy:${{ env.TRIVY_VERSION }} \
            image --scanners vuln --vuln-type os,library --severity HIGH,CRITICAL \
            --ignore-unfixed --format json \
            ${{ env.LOCAL_CI_TAG }} > trivy.json || true

          python - <<'PY'
import json

with open("trivy.json","r",encoding="utf-8") as f:
    data = json.load(f)

targets = {"wheel", "jaraco.context"}
hits = []

for r in data.get("Results", []):
    # focus on python packages section(s)
    vulns = r.get("Vulnerabilities") or []
    for v in vulns:
        pkg = v.get("PkgName")
        if pkg in targets:
            hits.append({
                "Target": r.get("Target"),
                "Type": r.get("Type"),
                "PkgName": pkg,
                "InstalledVersion": v.get("InstalledVersion"),
                "FixedVersion": v.get("FixedVersion"),
                "VulnerabilityID": v.get("VulnerabilityID"),
                "PkgPath": v.get("PkgPath"),
                "PrimaryURL": v.get("PrimaryURL"),
            })

print("\n==== TRIVY FORENSICS (wheel / jaraco.context) ====")
if not hits:
    print("No wheel/jaraco findings in JSON (unexpected if table shows them).")
else:
    for h in hits:
        print("-" * 72)
        for k in ["PkgName","InstalledVersion","FixedVersion","VulnerabilityID","PkgPath","Type","Target","PrimaryURL"]:
            print(f"{k}: {h.get(k)}")
print("\n==== END FORENSICS ====\n")
PY

          # Keep the JSON as an artifact for offline inspection
      - name: Upload trivy.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json-${{ github.run_id }}-${{ github.run_attempt }}
          path: trivy.json
          if-no-files-found: error

      # Enforcement scan (table) - fail on HIGH/CRITICAL
      - name: Vulnerability scan (Trivy) - fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_CI_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      # Push the SAME image that was scanned (no rebuild).
      - name: Tag and push scanned image (release + latest)
        run: |
          set -euxo pipefail

          RELEASE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          LATEST_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          docker tag ${{ env.LOCAL_CI_TAG }} "$RELEASE_REF"
          docker tag ${{ env.LOCAL_CI_TAG }} "$LATEST_REF"

          docker push "$RELEASE_REF"
          docker push "$LATEST_REF"

          echo "Pushed:"
          echo " - $RELEASE_REF"
          echo " - $LATEST_REF"
