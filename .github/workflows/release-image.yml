name: release-image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arunpk82/llm-judge-mvp

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # refs/tags/v0.1.14 -> v0.1.14
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set unique local image tag for this run
        id: img
        shell: bash
        run: |
          set -euo pipefail
          # Unique local tag prevents scanning an older image that reused :ci
          echo "local_tag=llm-judge-mvp:ci-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true
          cleanup: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          pull: true
          no-cache: true
          tags: ${{ steps.img.outputs.local_tag }}
          build-args: |
            AUDIT_SEED=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Trace image identity (prove what will be scanned)
        shell: bash
        run: |
          set -euo pipefail
          echo "LOCAL TAG: ${{ steps.img.outputs.local_tag }}"
          docker images --no-trunc | head -n 50
          docker inspect "${{ steps.img.outputs.local_tag }}" \
            --format 'IMAGE_ID={{.Id}} CREATED={{.Created}} REPO_TAGS={{json .RepoTags}}'

      - name: In-image metadata trace (wheel + jaraco.context)
        shell: bash
        run: |
          set -euo pipefail

          # Show runtime-installed versions
          docker run --rm "${{ steps.img.outputs.local_tag }}" sh -lc '
            set -eu
            python -V
            python -m pip --version
            echo "== pip show =="
            python -m pip show wheel jaraco.context || true
          '

          # Scan for dist-info METADATA anywhere in site-packages to match how scanners reason about installed packages
          docker run --rm "${{ steps.img.outputs.local_tag }}" sh -lc "
            set -eu
            python -c '
import sys
from pathlib import Path

TARGET = {\"wheel\": \"0.46.2\", \"jaraco.context\": \"6.1.0\"}
roots = []
# typical slim python location
roots.append(Path(\"/usr/local/lib/python3.11/site-packages\"))
roots = [r for r in roots if r.exists()]

def read_name_ver(meta: Path):
    name = ver = None
    try:
        for line in meta.read_text(errors=\"ignore\").splitlines():
            if line.startswith(\"Name: \"):
                name = line.split(\":\",1)[1].strip()
            elif line.startswith(\"Version: \"):
                ver = line.split(\":\",1)[1].strip()
            if name and ver:
                break
    except Exception:
        return None, None
    return name, ver

hits = []
for root in roots:
    for dist in root.glob(\"*.dist-info\"):
        meta = dist / \"METADATA\"
        if not meta.exists():
            continue
        n, v = read_name_ver(meta)
        if n in TARGET:
            hits.append((n, v, str(meta)))

print(\"TRACE: METADATA hits:\")
for n, v, p in sorted(hits):
    print(f\"  - {n} {v} :: {p}\")

bad = [(n,v,p) for (n,v,p) in hits if v != TARGET[n]]
if bad:
    print(\"TRACE: BAD METADATA found:\")
    for n,v,p in bad:
        print(f\"  - {n} {v} :: {p}\")
    raise SystemExit(2)
print(\"TRACE: OK - METADATA versions match expected\")'
          "

      - name: Vulnerability scan (Trivy) - fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ steps.img.outputs.local_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      - name: Tag and push scanned image (release + latest)
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          LATEST_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          docker tag "${{ steps.img.outputs.local_tag }}" "$RELEASE_REF"
          docker tag "${{ steps.img.outputs.local_tag }}" "$LATEST_REF"

          docker push "$RELEASE_REF"
          docker push "$LATEST_REF"

          echo "Pushed:"
          echo " - $RELEASE_REF"
          echo " - $LATEST_REF"
