name: release-image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Build and load locally so Trivy scans the daemon image
      - name: Build (load) image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: llm-judge-mvp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUDIT_SEED=${{ github.run_id }}

      # This prints the actual filesystem locations (what Trivy sees)
      - name: Audit wheel + jaraco.context dist-info paths (post-build)
        run: |
          docker run --rm llm-judge-mvp:ci python - <<'PY'
          import sys, site
          from pathlib import Path

          def roots():
            r = []
            r += site.getsitepackages()
            usp = site.getusersitepackages()
            if usp:
              r.append(usp)
            for p in sys.path:
              if p and ("site-packages" in p or "dist-packages" in p):
                r.append(p)
            out = []
            for x in dict.fromkeys(r):
              px = Path(x)
              if px.exists():
                out.append(px)
            return out

          def meta(dist):
            m = dist/"METADATA"
            if not m.exists():
              return None, None
            name = ver = None
            for line in m.read_text(errors="ignore").splitlines():
              if line.startswith("Name: "): name = line.split(":",1)[1].strip()
              if line.startswith("Version: "): ver = line.split(":",1)[1].strip()
              if name and ver: break
            return name, ver

          targets = {"wheel", "jaraco.context"}
          print("AUDIT: roots:")
          for r in roots():
            print(" -", r)

          print("\nAUDIT: dist-info hits:")
          for r in roots():
            for d in r.glob("*.dist-info"):
              n,v = meta(d)
              if n in targets:
                print(f" - {n} {v} :: {d}")
          PY

      - name: Vulnerability scan (Trivy) - fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: llm-judge-mvp:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      - name: Build & Push (release)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUDIT_SEED=${{ github.run_id }}

      - name: Print pushed image reference
        run: |
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          echo "Also tagged: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
