name: release-image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LOCAL_CI_TAG: llm-judge-mvp:ci

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Build ONCE and load into the local docker daemon (single-source-of-truth for scan + push)
      - name: Build (load) image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          pull: true
          tags: ${{ env.LOCAL_CI_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AUDIT_SEED=${{ github.run_id }}-${{ github.run_attempt }}

      # World-class “show me exactly what got installed and from where”
      - name: Audit wheel + jaraco.context (pip show + import path + dist-info METADATA hits)
        run: |
          set -euxo pipefail

          echo "== pip show =="
          docker run --rm ${{ env.LOCAL_CI_TAG }} sh -lc '
            python -V
            python -m pip --version
            python -m pip show wheel jaraco.context || true
          '

          echo "== import locations =="
          docker run --rm ${{ env.LOCAL_CI_TAG }} python - <<'PY'
          import importlib, sys
          for m in ["wheel", "jaraco.context"]:
            mod = importlib.import_module(m)
            print(f"{m}: {getattr(mod, '__file__', None)}")
          print("sys.executable:", sys.executable)
          PY

          echo "== dist-info METADATA hits (what Trivy reads) =="
          docker run --rm ${{ env.LOCAL_CI_TAG }} python - <<'PY'
          import sys, site
          from pathlib import Path

          def roots():
            r = []
            r += site.getsitepackages()
            usp = site.getusersitepackages()
            if usp:
              r.append(usp)
            for p in sys.path:
              if p and ("site-packages" in p or "dist-packages" in p):
                r.append(p)
            out = []
            for x in dict.fromkeys(r):
              px = Path(x)
              if px.exists() and px.is_dir():
                out.append(px)
            return out

          def meta(dist):
            m = dist / "METADATA"
            if not m.exists():
              return None, None
            name = ver = None
            for line in m.read_text(errors="ignore").splitlines():
              if line.startswith("Name: "):
                name = line.split(":", 1)[1].strip()
              elif line.startswith("Version: "):
                ver = line.split(":", 1)[1].strip()
              if name and ver:
                break
            return name, ver

          targets = {"wheel", "jaraco.context"}
          print("AUDIT roots:")
          for r in roots():
            print(" -", r)

          print("\nAUDIT dist-info hits:")
          for r in roots():
            for d in r.glob("*.dist-info"):
              n, v = meta(d)
              if n in targets:
                print(f" - {n} {v} :: {d}")
          PY

      - name: Vulnerability scan (Trivy) - fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_CI_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      # Push the SAME image that was scanned (no rebuild).
      - name: Tag and push scanned image (release + latest)
        run: |
          set -euxo pipefail

          RELEASE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          LATEST_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          docker tag ${{ env.LOCAL_CI_TAG }} "$RELEASE_REF"
          docker tag ${{ env.LOCAL_CI_TAG }} "$LATEST_REF"

          docker push "$RELEASE_REF"
          docker push "$LATEST_REF"

          echo "Pushed:"
          echo " - $RELEASE_REF"
          echo " - $LATEST_REF"
