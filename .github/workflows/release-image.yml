name: release-image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arunpk82/llm-judge-mvp

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set unique local image tag for this run
        id: img
        shell: bash
        run: |
          set -euo pipefail
          echo "local_tag=llm-judge-mvp:ci-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true
          cleanup: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          pull: true
          no-cache: true
          tags: ${{ steps.img.outputs.local_tag }}
          build-args: |
            AUDIT_SEED=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Trace image identity (prove what will be scanned)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.img.outputs.local_tag }}"
          echo "LOCAL TAG: ${TAG}"
          docker inspect "${TAG}" --format 'IMAGE_ID={{.Id}} CREATED={{.Created}}'

      - name: In-image trace (wheel + jaraco.context)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.img.outputs.local_tag }}"

          echo "== pip show =="
          docker run --rm "${TAG}" python -m pip show wheel jaraco.context || true

          echo "== METADATA scan (site-packages) =="
          docker run --rm "${TAG}" python - <<'PY'
          import sys
          from pathlib import Path

          TARGET = {"wheel": "0.46.2", "jaraco.context": "6.1.0"}
          roots = [Path("/usr/local/lib/python3.11/site-packages")]

          def read_name_ver(meta: Path):
              name = ver = None
              for line in meta.read_text(errors="ignore").splitlines():
                  if line.startswith("Name: "):
                      name = line.split(":", 1)[1].strip()
                  elif line.startswith("Version: "):
                      ver = line.split(":", 1)[1].strip()
                  if name and ver:
                      break
              return name, ver

          hits = []
          for root in roots:
              if not root.exists():
                  continue
              for dist in root.glob("*.dist-info"):
                  meta = dist / "METADATA"
                  if not meta.exists():
                      continue
                  n, v = read_name_ver(meta)
                  if n in TARGET:
                      hits.append((n, v, str(dist)))

          print("TRACE: dist-info hits:")
          for n, v, p in sorted(hits):
              print(f"  - {n} {v} :: {p}")

          bad = [(n, v, p) for (n, v, p) in hits if v != TARGET[n]]
          if bad:
              print("TRACE: BAD dist-info present:")
              for n, v, p in bad:
                  print(f"  - {n} {v} :: {p}")
              raise SystemExit(2)

          print("TRACE: OK - expected versions present")
          PY

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ steps.img.outputs.local_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      - name: Tag and push scanned image (release + latest)
        shell: bash
        run: |
          set -euo pipefail

          LOCAL="${{ steps.img.outputs.local_tag }}"
          RELEASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          docker tag "${LOCAL}" "${RELEASE}"
          docker tag "${LOCAL}" "${LATEST}"

          docker push "${RELEASE}"
          docker push "${LATEST}"

          echo "Pushed:"
          echo " - ${RELEASE}"
          echo " - ${LATEST}"
