name: release-image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LOCAL_CI_TAG: llm-judge-mvp:ci

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          use: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Build ONCE and load into the local docker daemon (single-source-of-truth for scan + push)
      - name: Build (load) image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          pull: true
          # IMPORTANT: release builds should be deterministic; avoid “stale cache surprises”
          no-cache: true
          tags: ${{ env.LOCAL_CI_TAG }}
          build-args: |
            AUDIT_SEED=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Show image identity (what we will scan + push)
        run: |
          set -euxo pipefail
          docker image inspect ${{ env.LOCAL_CI_TAG }} --format 'ImageID={{.Id}} Created={{.Created}}'

      # World-class audit: enumerate wheel/jaraco.context metadata across the ENTIRE filesystem,
      # not only sys.path. This matches how scanners can behave.
      - name: Audit wheel + jaraco.context (filesystem-wide METADATA)
        run: |
          set -euxo pipefail

          docker run --rm ${{ env.LOCAL_CI_TAG }} python - <<'PY'
          import os
          import sys
          from pathlib import Path

          TARGET = {
              "wheel": "0.46.2",
              "jaraco.context": "6.1.0",
          }

          SKIP_PREFIXES = (
              "/proc", "/sys", "/dev", "/run",
              "/var/lib/docker", "/var/lib/containerd",
              "/mnt", "/tmp",
          )

          def should_skip(path: str) -> bool:
              return path.startswith(SKIP_PREFIXES)

          def read_metadata(meta_path: Path):
              # parse Name/Version from METADATA with minimal assumptions
              name = ver = None
              try:
                  for line in meta_path.read_text(errors="ignore").splitlines():
                      if line.startswith("Name: "):
                          name = line.split(":", 1)[1].strip()
                      elif line.startswith("Version: "):
                          ver = line.split(":", 1)[1].strip()
                      if name and ver:
                          break
              except Exception:
                  return None, None
              return name, ver

          print("TRACE: python =", sys.version.replace("\n", " "))
          print("TRACE: executable =", sys.executable)
          print("TRACE: scanning filesystem for *.dist-info/METADATA for:", ", ".join(TARGET.keys()))
          print("TRACE: skip prefixes:", SKIP_PREFIXES)
          print()

          hits = []
          # Walk from filesystem root
          for root, dirs, files in os.walk("/", topdown=True):
              if should_skip(root):
                  dirs[:] = []
                  continue

              # prune aggressively: if directory list contains skipped paths deeper, keep normal behavior
              # keep dirs as-is; root-level skip already handles heavy areas

              if not root.endswith(".dist-info"):
                  continue

              meta = Path(root) / "METADATA"
              if not meta.exists():
                  continue

              name, ver = read_metadata(meta)
              if name in TARGET:
                  hits.append((name, ver, str(meta)))

          hits_sorted = sorted(hits, key=lambda x: (x[0], x[1] or "", x[2]))

          print("TRACE: METADATA hits (filesystem-wide):")
          if not hits_sorted:
              print("  (none found)  <-- this would be unexpected for wheel")
          else:
              for name, ver, meta in hits_sorted:
                  print(f"  - {name} {ver} :: {meta}")

          bad = [(n, v, m) for (n, v, m) in hits_sorted if v != TARGET[n]]
          print()
          if bad:
              print("TRACE: BAD (stale/vulnerable) METADATA found:")
              for n, v, m in bad:
                  print(f"  - {n} {v} :: {m}")
              raise SystemExit("FAIL: stale dist-info METADATA exists for wheel/jaraco.context")
          else:
              print("TRACE: OK - no stale METADATA exists for wheel/jaraco.context")
          PY

          echo "== pip show (sanity) =="
          docker run --rm ${{ env.LOCAL_CI_TAG }} sh -lc '
            python -V
            python -m pip --version
            python -m pip show wheel jaraco.context || true
          '

      - name: Vulnerability scan (Trivy) - fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_CI_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"

      # Push the SAME image that was scanned (no rebuild).
      - name: Tag and push scanned image (release + latest)
        run: |
          set -euxo pipefail

          RELEASE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
          LATEST_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          docker tag ${{ env.LOCAL_CI_TAG }} "$RELEASE_REF"
          docker tag ${{ env.LOCAL_CI_TAG }} "$LATEST_REF"

          docker push "$RELEASE_REF"
          docker push "$LATEST_REF"

          echo "Pushed:"
          echo " - $RELEASE_REF"
          echo " - $LATEST_REF"
