    milestone: CAP-5
    level: L3
    mandatory: false
    labels: [epic, cap:artifact-governance, priority:medium]
    status: done
    wave: 3
    close_comment: >
      Completed Wave 3. trace_by_run_id() for lineage queries,
      temporal CLI (event-query, event-trace, event-stats).

  # CAP-6
  - id: EPIC-6.1
    title: "[EPIC] EPIC-6.1 Multi-Dimensional Drift Detection"
    milestone: CAP-6
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring, priority:high]
    status: done
    wave: 2
    close_comment: >
      Completed Wave 2. Heartbeat check (alert if no eval_run events),
      cross-dimensional correlation (governance events near metric violations),
      drift_alert events emitted to event registry.

  - id: EPIC-6.2
    title: "[EPIC] EPIC-6.2 Causation Analysis & Response Actions"
    milestone: CAP-6
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring, priority:high]
    status: done
    wave: 2
    close_comment: >
      Completed Wave 2. Causation report (ranked by temporal proximity),
      response action matrix (block/warn/log per metric), drift issue
      lifecycle state machine (Detected → Triaged → Responding → Resolved).

  # CAP-7
  - id: EPIC-7.1
    title: "[EPIC] EPIC-7.1 LLM Judge Registration & Calibration"
    milestone: CAP-7
    level: L4
    mandatory: true
    labels: [epic, cap:calibration]
    status: done
    wave: 5
    close_comment: >
      Completed L4 build. Judge registry (configs/judges/registry.yaml),
      calibration pipeline (per-dimension accuracy against golden dataset),
      trust gate (block uncalibrated judges), CalibratedJudge wrapper,
      prompt versioning with diff tracking (configs/prompts/).

  - id: EPIC-7.2
    title: "[EPIC] EPIC-7.2 Dimensional Evaluation & Bias Reduction"
    milestone: CAP-7
    level: L4
    mandatory: true
    labels: [epic, cap:calibration]
    status: done
    wave: 5
    close_comment: >
      Completed L4 build. Position bias detection (randomized order, inconsistency rate),
      length bias detection (Pearson correlation), DebiasedJudge wrapper (N evaluations,
      majority vote), hallucination detection (grounding ratio, ungrounded claims,
      citation verification).

  - id: EPIC-7.3
    title: "[EPIC] EPIC-7.3 Human Adjudication Interface"
    milestone: CAP-7
    level: L4
    mandatory: false
    labels: [epic, cap:calibration]
    status: done
    wave: 5
    close_comment: >
      Completed L4 build. Confidence router (threshold + flag-based routing),
