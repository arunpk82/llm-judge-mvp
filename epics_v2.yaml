  - id: EPIC-7.2
    title: "[EPIC] EPIC-7.2 Dimensional Evaluation & Bias Reduction"
    milestone: CAP-7
    level: L4
    mandatory: true
    labels: [epic, cap:calibration]
    status: planned
    effort: "L — 3 weeks"
    purpose: >
      Break evaluation into dimensions and mitigate documented LLM-as-judge biases.
      L4 capability. Dimensional scoring structure already exists in deterministic
      scorer (relevance, clarity, correctness, tone) — this extends it to LLM judges.
    vision_objective: "Explainable evaluation with active bias mitigation"
    scope_in:
      - Dimensional evaluation (per-dimension Yes/No/Unknown)
      - Hallucination detection (embedding distance)
      - Bias mitigation (position, length, self-preference)
    scope_out:
      - Current sprint scope
    acceptance_criteria:
      - "Given an LLM evaluation, then each dimension is scored independently with confidence"
      - "Given position bias test, then randomization produces < 10% inconsistency"
    tasks:
      - "TASK-7.2.1: Implement dimensional LLM evaluation pipeline"
      - "TASK-7.2.2: Implement hallucination detection"
      - "TASK-7.2.3: Implement bias mitigation strategies"

