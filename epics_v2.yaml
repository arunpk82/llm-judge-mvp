  # =====================================================================
  # CAP-6 — Drift & Degradation Monitoring
  # =====================================================================

  - id: EPIC-6.1
    title: "[EPIC] EPIC-6.1 Multi-Dimensional Drift Detection"
    milestone: CAP-6
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring, priority:high]
    status: in_progress
    effort: "S — 3 days"
    wave: 2
    purpose: >
      Detect quality degradation across multiple dimensions simultaneously.
      Point drift and trend drift exist but operate per-metric independently.
      Architecture requires cross-dimensional correlation.
      Gates: Drift Detection SLA < 24h.
    vision_objective: "Silent quality degradation detected before it reaches customers"
    scope_in:
      - Cross-dimensional correlation (metric change + rule change in same window)
      - Missing-data-is-failure heartbeat (alert if expected signals stop arriving)
      - Ingest rule_change and dataset_registration events from event registry
    scope_out:
      - Causation analysis (EPIC 6.2)
      - Anomaly detection beyond thresholds (future)
    acceptance_criteria:
      - "Given Kappa drop AND rule change in same 24h window, then drift report correlates both events"
      - "Given expected signal not received within configured interval, then heartbeat alert fires"
      - "Given drift check runs, then it consumes events from event_registry.jsonl (not just run_registry.jsonl)"
    tasks:
      - "TASK-6.1.1: Extend drift.py to consume event_registry.jsonl (rule_change, dataset_registration events)"
      - "TASK-6.1.2: Add cross-dimensional correlation (match metric changes with events in same time window)"
      - "TASK-6.1.3: Add heartbeat check (alert if no eval_run events in configurable interval)"

  - id: EPIC-6.2
    title: "[EPIC] EPIC-6.2 Causation Analysis & Response Actions"
    milestone: CAP-6
    level: L3
    mandatory: true
    labels: [epic, cap:drift-monitoring, priority:high]
    status: planned
    effort: "M — 4 days"
    wave: 2
    purpose: >
      When drift is detected, determine probable cause and trigger mandatory
      response. Without this, detection is just observation — issues are seen
      but never acted on (P05: detection without response is just observation).
    vision_objective: "Every drift detection triggers a tracked response"
    scope_in:
      - Causation report (ranked likely causes by temporal proximity)
      - Response action matrix (investigate, recalibrate, rollback, escalate)
      - Lifecycle state machine for issues (Detected → Triaged → Responding → Resolved)
      - Structured alert output with recommended actions
    scope_out:
      - Dashboard delivery of alerts (EPIC 8.2)
      - Automated remediation
    acceptance_criteria:
      - "Given a drift alert, then causation report includes correlated events ranked by temporal proximity"
      - "Given a causation report, then it includes recommended response action"
      - "Given a drift alert, then a response_required record is created in event registry"
      - "Given no response within configurable SLA, then escalation alert fires"
    tasks:
      - "TASK-6.2.1: Implement causation analysis (correlate drift alert with events in ±24h window)"
      - "TASK-6.2.2: Define response action matrix in drift policy YAML (per-metric response type)"
      - "TASK-6.2.3: Add lifecycle state machine for drift issues (append state transitions to event registry)"
      - "TASK-6.2.4: Add escalation check (no response within SLA → escalation event)"

