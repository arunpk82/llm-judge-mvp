# =======================================================================
# EPICs — ALL CLOSED
# =======================================================================
epics:

  # CAP-1
  - id: EPIC-1.1
    title: "[EPIC] EPIC-1.1 Dataset Ingestion & Validation Pipeline"
    milestone: CAP-1
    level: L3
    mandatory: true
    labels: [epic, cap:dataset-governance, priority:critical]
    status: done
    wave: 1
    close_comment: >
      Completed Wave 1+4. Validator wired into registry.resolve() (non-bypassable),
      case_id completeness check, bypass path deprecated, validation_report.json emitted,
      security scanning with 4 injection patterns (prompt override, role injection,
      jailbreak, XML injection).

  - id: EPIC-1.2
    title: "[EPIC] EPIC-1.2 Dataset Registration & Version Pinning"
    milestone: CAP-1
    level: L3
    mandatory: true
    labels: [epic, cap:dataset-governance, priority:critical]
    status: done
    wave: 1
    close_comment: >
      Completed Wave 1+4. SHA-256 hash verification on every read,
      content_hash populated in dataset.yaml, dataset CLI module
      (python -m llm_judge.datasets list/validate/inspect).

  # CAP-2
  - id: EPIC-2.1
    title: "[EPIC] EPIC-2.1 Evaluation Setup & Compatibility Check"
    milestone: CAP-2
    level: L3
    mandatory: true
    labels: [epic, cap:scoring-engine, priority:high]
    status: done
    wave: 1
    close_comment: >
      Completed Wave 1. Config-driven rule plan loading via load_plan_for_rubric(),
      pre-flight compatibility check (rubric, rule plan, dataset fields),
      math_basic_v1.yaml rule plan config.

  - id: EPIC-2.2
    title: "[EPIC] EPIC-2.2 Scoring Execution with Smoke Test Gate"
    milestone: CAP-2
    level: L3
    mandatory: true
    labels: [epic, cap:scoring-engine, priority:high]
    status: done
    wave: 3
    close_comment: >
      Completed Wave 3. Smoke test gate (fast-fail after N cases),
      per-rule hit-rate tracking in metrics.json, streaming progress output.

  - id: EPIC-2.3
    title: "[EPIC] EPIC-2.3 Verdict Aggregation & Artifact Emission"
    milestone: CAP-2
    level: L3
    mandatory: true
    labels: [epic, cap:scoring-engine]
    status: done
    close_comment: "Pre-existing. Kappa, F1, judgments.jsonl, metrics.json, manifest.json."

  # CAP-3
  - id: EPIC-3.1
    title: "[EPIC] EPIC-3.1 Rule Plan Versioning & Schema Validation"
    milestone: CAP-3
    level: L3
    mandatory: true
    labels: [epic, cap:rule-governance, priority:high]
    status: done
    wave: 2
    close_comment: >
      Completed Waves 1+2. Manifest duplicates fixed, lifecycle validation wired
      into eval runner, structured audit trail (append-only JSONL).

  - id: EPIC-3.2
    title: "[EPIC] EPIC-3.2 Rule Aging & Deprecation Engine"
    milestone: CAP-3
    level: L3
    mandatory: true
    labels: [epic, cap:rule-governance, priority:medium]
    status: done
    wave: 2
    close_comment: >
      Completed Wave 2. Aging calculation, stale rule detection,
      deprecation enforcement in RuleEngine (deprecated-enforced rules
      auto-excluded from plans), CLI commands (rules-aging, rules-audit).

  - id: EPIC-3.3
    title: "[EPIC] EPIC-3.3 Rule Drift Detection"
    milestone: CAP-3
    level: L3
    mandatory: true
    labels: [epic, cap:rule-governance, priority:high]
    status: done
    wave: 1
    close_comment: >
      Completed Waves 1+2. check_rules_governed() wired into eval runner
      pre-flight, emit_rule_snapshot() records rule state to event registry.

  # CAP-4
  - id: EPIC-4.1
    title: "[EPIC] EPIC-4.1 Golden Baseline Management"
    milestone: CAP-4
    level: L3
    mandatory: true
    labels: [epic, cap:baseline-governance]
    status: done
    close_comment: "Pre-existing. 770-line baseline.py, policy-gated promotion."

  - id: EPIC-4.2
    title: "[EPIC] EPIC-4.2 Diff Engine & Flip Tracking"
    milestone: CAP-4
    level: L3
    mandatory: true
    labels: [epic, cap:baseline-governance]
    status: done
    close_comment: "Pre-existing. 507-line diff.py, flip tracking, policy violations."

  - id: EPIC-4.3
    title: "[EPIC] EPIC-4.3 CI Regression Gate"
    milestone: CAP-4
    level: L3
    mandatory: true
    labels: [epic, cap:baseline-governance]
    status: done
    close_comment: "Pre-existing. Full preflight chain in Makefile."

  # CAP-5
  - id: EPIC-5.1
    title: "[EPIC] EPIC-5.1 Master Artifact Registry & Immutability"
    milestone: CAP-5
    level: L3
    mandatory: true
    labels: [epic, cap:artifact-governance, priority:critical]
    status: done
    wave: 2
    close_comment: >
      Completed Wave 2. Cross-capability event_registry.py with 6 typed events,
      append with retry (3 attempts, exponential backoff), query by type/time/related_id,
      window query for causation analysis. Events emitted from eval runner,
      baseline promotion, and rule lifecycle.

  - id: EPIC-5.2
